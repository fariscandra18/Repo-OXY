<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Input Tabung (Batch)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }

        .app-container {
            width: 100%; max-width: 480px;
            background: var(--white); border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden; display: flex; flex-direction: column;
            position: relative;
        }

        header {
            background: var(--primary); color: white; padding: 1.5rem;
            text-align: center;
        }
        header h1 { font-size: 1.2rem; margin-bottom: 5px; }
        header p { font-size: 0.8rem; opacity: 0.9; }

        .nav-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .nav-tab {
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            font-weight: 500; color: #6b7280; transition: 0.2s;
        }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #eff6ff; }

        .content-area { padding: 20px; display: none; }
        .content-area.active { display: block; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #374151; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 1rem; transition: 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 2px solid rgba(37,99,235,0.2); }

        /* LIST SCAN STYLE */
        #scan-list-container {
            margin-bottom: 15px; max-height: 200px; overflow-y: auto;
            border: 1px solid var(--border); border-radius: 8px; background: #f9fafb;
            display: none; /* Hidden if empty */
        }
        #scan-list-container.active { display: block; }
        
        .scan-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid var(--border); background: white;
        }
        .scan-item:last-child { border-bottom: none; }
        .scan-info { font-size: 0.85rem; }
        .scan-code { font-weight: bold; color: var(--primary); }
        .btn-remove { 
            color: var(--danger); background: #fee2e2; border: none; 
            padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem;
            display: inline-flex; justify-content: center; align-items: center;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; margin-top: 5px; }
        
        /* SCANNER OVERLAY */
        #reader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: black; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #reader-container.active { display: flex; }

        #reader video { 
            width: 100% !important; height: 100% !important; object-fit: cover !important; 
            border-radius: 0 !important; position: absolute !important; top: 0 !important; left: 0 !important;
        }
        #reader { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1001; }

        .scan-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 280px; border: 2px solid rgba(0, 255, 0, 0.8);
            border-radius: 10px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7); 
            pointer-events: none; z-index: 1002;
        }
        .scan-line {
            width: 100%; height: 2px; background: #ef4444; position: absolute;
            top: 0; animation: scan-anim 2s infinite linear;
        }
        @keyframes scan-anim { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        
        .overlay-buttons {
            position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; 
            gap: 10px; align-items: center; z-index: 1003;
        }
        .scan-btn-overlay {
            background: white; color: black; border: none; padding: 12px 30px;
            border-radius: 30px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer; width: 80%; max-width: 300px;
        }
        .scan-btn-overlay.secondary {
            background: rgba(255,255,255,0.2); color: white; width: auto; padding: 8px 20px; font-size: 0.9rem;
        }

        .hint-text {
            position: absolute; top: 40px; color: white; font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 1001; text-align: center; width: 100%;
        }

        .preview-box {
            border: 2px dashed #d1d5db; padding: 20px; border-radius: 10px;
            text-align: center; margin-top: 15px; background: #f9fafb;
        }
        .barcode-img { max-width: 100%; height: 80px; margin-bottom: 10px; }
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid var(--primary);
            border-radius: 50%; width: 24px; height: 24px;
            animation: spin 1s linear infinite; display: none; margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <!-- OVERLAY SCANNER -->
    <div id="reader-container">
        <div class="hint-text">Arahkan Barcode ke Kotak...</div>
        <div id="reader"></div>
        <div class="scan-box">
            <div class="scan-line"></div>
        </div>
        
        <div class="overlay-buttons">
            <button class="scan-btn-overlay" onclick="document.getElementById('fileInput').click()">
                📂 Pilih dari Galeri
            </button>
            <button class="scan-btn-overlay secondary" style="background: var(--success);" onclick="finishScanning()">
                ✅ Selesai Scan
            </button>
            <button class="scan-btn-overlay secondary" onclick="stopCamera()">
                Batal
            </button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <h1>Monitoring Tabung</h1>
            <p>Input Batch Scan</p>
        </header>

        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('input')">📝 Scan & Input</div>
            <div class="nav-tab" onclick="switchTab('generator')">🏷️ Buat Barcode</div>
        </div>

        <div id="tab-input" class="content-area active">
            <form id="dataForm">
                
                <!-- 1. Isi Data Sekali -->
                <div class="form-group">
                    <label>Nama Mekanik</label>
                    <input type="text" id="mechanic" class="form-control" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group">
                    <label>Alokasi</label>
                    <select id="allocation" class="form-control" required>
                        <option value="" disabled selected>Pilih Lokasi...</option>
                        <option value="Reguler">Reguler</option>
                        <option value="Storing">Storing</option>
                        <option value="PMS 01">PMS 01</option>
                        <option value="PMS 02">PMS 02</option>
                        <option value="PMS 03">PMS 03</option>
                        <option value="Site CDP">Site CDP</option>
                        <option value="Site MDL">Site MDL</option>
                        <option value="Site DAMCO">Site DAMCO</option>
                        <option value="Site TM">Site TM</option>
                        <option value="Site Kembangan">Site Kembangan</option>
                        <option value="Vendor">Vendor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <select id="transType" class="form-control" required>
                        <option value="Permintaan">Permintaan</option>
                        <option value="Pengeluaran">Pengeluaran</option>
                    </select>
                </div>

                <!-- Tombol Mulai Scan -->
                <div class="form-group">
                    <button type="button" class="btn btn-primary" onclick="startCamera()">
                        📸 Mulai Scan
                    </button>
                    <div style="margin-top:8px; font-size:0.75rem; color:#666; text-align:center;">
                        Klik tombol di atas untuk scan banyak tabung sekaligus.
                    </div>
                </div>

                <!-- Daftar Scan (Batch List) -->
                <div id="scan-list-container">
                    <!-- Item akan muncul di sini via JS -->
                </div>

                <!-- Tombol Submit Batch -->
                <div class="loader" id="loading"></div>
                <button type="submit" class="btn btn-success" id="submitBtn">Kirim Data (0 Tabung)</button>
            </form>
        </div>

        <!-- TAB 2: GENERATOR -->
        <div id="tab-generator" class="content-area">
            <div class="form-group">
                <label>Pilih Jenis Tabung</label>
                <select id="genType" class="form-control">
                    <option value="SAM">Oxygen Samator</option>
                    <option value="HB">Oxygen HB</option>
                    <option value="LPG-B">LPG Biru 12kg</option>
                    <option value="LPG-P">LPG Pink 12kg</option>
                    <option value="LPG-50">LPG 50kg</option>
                    <option value="ACY">Acetylene</option>
                </select>
            </div>
            <button type="button" class="btn btn-primary" onclick="generateAndDownload()">Generate & Download</button>
            <div class="preview-box" id="previewBox" style="display:none;">
                <img id="barcodeImg" class="barcode-img" src="" alt="Barcode">
                <div style="font-weight:bold; margin-bottom:5px;" id="codeText"></div>
                <a id="downloadBtn" class="download-link" target="_blank">Klik disini jika download otomatis gagal</a>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyI2HsIpHjcCSUhrfKyTUqQmodyr5cMIcmjYE_OMcbP6cjr080arNQi8MgJDXRUpGI_lw/exec";
        
        // --- STATE UNTUK BATCH ---
        let scannedItems = []; // Array untuk menyimpan banyak barcode
        let html5QrcodeScanner = null;
        let isCameraRunning = false;

        // --- 1. LOGIKA SCANNER BATCH ---
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', e => {
            if (e.target.files.length == 0) return;
            const imageFile = e.target.files[0];
            if(!html5QrcodeScanner) html5QrcodeScanner = new Html5Qrcode("reader");
            
            html5QrcodeScanner.scanFile(imageFile, true)
                .then(decodedText => handleBatchScan(decodedText))
                .catch(err => alert("Gagal membaca barcode pada foto."));
        });

        function startCamera() {
            const readerContainer = document.getElementById('reader-container');
            
            if(!isCameraRunning) {
                if(!html5QrcodeScanner) html5QrcodeScanner = new Html5Qrcode("reader");
                
                const config = {
                    fps: 10, qrbox: { width: 360, height: 280 }, aspectRatio: 1.777,
                    videoConstraints: { facingMode: "environment", advanced: [{ focusMode: "continuous" }] }
                };

                if (location.protocol !== 'https:') alert("WARNING: Tidak ada HTTPS.");

                html5QrcodeScanner.start(config.videoConstraints, config, handleBatchScan)
                .then(() => {
                    isCameraRunning = true;
                    readerContainer.classList.add('active'); 
                })
                .catch(err => {
                    alert("Gagal kamera. Gunakan tombol 'Pilih dari Galeri'.");
                });
            }
        }

        function finishScanning() {
            stopCamera();
            alert("Scanning dihentikan. Anda bisa mengirim data atau menambah lagi.");
        }

        function stopCamera() {
            if(html5QrcodeScanner && isCameraRunning) {
                html5QrcodeScanner.stop().then(() => {
                    isCameraRunning = false;
                    document.getElementById('reader-container').classList.remove('active');
                }).catch(err => console.error(err));
            } else {
                document.getElementById('reader-container').classList.remove('active');
            }
        }

        // --- 2. FUNGSI HANDLE SCAN (ADD TO LIST) ---
        function handleBatchScan(decodedText) {
            // 1. Cek Form
            const mechanic = document.getElementById('mechanic').value;
            const allocation = document.getElementById('allocation').value;
            const transType = document.getElementById('transType').value;

            if(!mechanic || !allocation) {
                alert("⚠️ Harap isi Nama Mekanik dan Alokasi sebelum scan!");
                return;
            }

            // 2. Tentukan Jenis
            const gasType = identifyCode(decodedText);

            // 3. Tambah ke Array
            scannedItems.push({
                barcode: decodedText,
                gasType: gasType,
                mechanic: mechanic,
                allocation: allocation,
                transType: transType,
                timestamp: new Date().toLocaleString('id-ID')
            });

            // 4. Update UI
            renderList();
            playBeep(); // Feedback suara (opsional)
        }

        function identifyCode(code) {
            const c = code.trim().toUpperCase();
            if(c.startsWith("SAM")) return "Oxygen Samator";
            else if(c.startsWith("HB")) return "Oxygen HB";
            else if(c.startsWith("LPG-B")) return "LPG Biru 12kg";
            else if(c.startsWith("LPG-P")) return "LPG Pink 12kg";
            else if(c.startsWith("LPG-50")) return "LPG 50kg";
            else if(c.startsWith("ACY")) return "Acetylene";
            return "Unknown";
        }

        function renderList() {
            const container = document.getElementById('scan-list-container');
            const submitBtn = document.getElementById('submitBtn');
            
            container.innerHTML = "";
            
            if(scannedItems.length > 0) {
                container.classList.add('active');
                submitBtn.innerText = `Kirim Data (${scannedItems.length} Tabung)`;
                submitBtn.style.background = "#059669"; // Warna lebih gelap
            } else {
                container.classList.remove('active');
                submitBtn.innerText = `Kirim Data (0 Tabung)`;
                submitBtn.style.background = ""; // Reset
            }

            scannedItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'scan-item';
                div.innerHTML = `
                    <div class="scan-info">
                        <div class="scan-code">${item.barcode}</div>
                        <div>${item.gasType}</div>
                    </div>
                    <button class="btn-remove" onclick="removeItem(${index})">Hapus</button>
                `;
                container.appendChild(div);
            });
        }

        function removeItem(index) {
            scannedItems.splice(index, 1);
            renderList();
        }

        // --- 3. SUBMIT BATCH ---
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if(scannedItems.length === 0) {
                alert("Belum ada tabung yang di-scan.");
                return;
            }

            if(!SCRIPT_URL) { alert("Error: URL Script belum diset."); return; }

            showLoader(true);
            
            // Kirim Array Data
            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(scannedItems) // Kirim Array Banyak Item
            })
            .then(() => {
                scannedItems = []; // Reset array
                renderList();
                alert(`✅ Berhasil mengirim ${scannedItems.length} data ke Spreadsheet!`);
            })
            .catch(err => alert("Gagal kirim data: " + err))
            .finally(() => showLoader(false));
        });

        // --- UTILS ---
        function switchTab(id) {
            document.querySelectorAll('.content-area').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.nav-tab')[id==='input'?0:1].classList.add('active');
        }
        function showLoader(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
        function playBeep() {
            // Simple feedback visual karena audio autoplay sering diblokir
            // Bisa ditambahkan flash layar putih sebentar
        }

        // --- GENERATOR (Sama seperti sebelumnya) ---
        async function generateAndDownload() {
            const type = document.getElementById('genType').value;
            const randomNum = Math.floor(10000 + Math.random() * 90000);
            const code = `${type}-${randomNum}`;
            const apiUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${code}&scale=2&height=8&includeText=true`;
            const img = document.getElementById('barcodeImg');
            const box = document.getElementById('previewBox');
            const btn = document.getElementById('downloadBtn');
            const txt = document.getElementById('codeText');
            img.src = apiUrl;
            txt.innerText = code;
            box.style.display = 'block';
            try {
                const response = await fetch(apiUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none'; a.href = url; a.download = `Barcode-${code}.png`;
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url); document.body.removeChild(a);
            } catch (err) { alert("Download blocked"); btn.href = apiUrl; btn.setAttribute("download", `Barcode-${code}.png`); }
        }
    </script>
</body>
</html>
